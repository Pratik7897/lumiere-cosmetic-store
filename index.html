<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LUMIÈRE — Curated luxury cosmetics store. Shop skincare, lipsticks, fragrances and more from 50+ premium brands with free shipping on orders above ₹999.">
<meta name="theme-color" content="#2d1b2e">
<meta property="og:title" content="LUMIÈRE — Cosmetic Store">
<meta property="og:description" content="Curated luxury cosmetics — from skincare essentials to statement looks. Discover your perfect ritual.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💄</text></svg>">
<title>LUMIÈRE — Cosmetic Store</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- PROMO BANNER -->
<div class="promo-banner">✦ <strong>Free Shipping</strong> on orders above ₹999 &nbsp;·&nbsp; Use code <strong>LUMIERE20</strong> for 20% off ✦</div>

<!-- TOPBAR -->
<nav class="topbar" style="top:36px" role="navigation" aria-label="Main navigation">
  <div class="topbar-logo" onclick="showPage('home')" role="banner" tabindex="0" aria-label="LUMIÈRE Home">LUMI<span>ÈRE</span></div>
  <div class="topbar-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search products, brands…" oninput="handleSearch(this.value)" onkeydown="if(event.key==='Enter')handleSearch(this.value)" aria-label="Search">
  </div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="showPage('home')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="topbar-btn" onclick="showPage('orders')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>Orders</span>
    </button>
    <button class="topbar-btn" onclick="showPage('cart')" style="position:relative">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>Cart</span>
      <span class="cart-badge hidden" id="cart-badge">0</span>
    </button>
    <button class="topbar-btn" onclick="showPage('admin')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Admin</span>
    </button>
    <button class="topbar-btn" onclick="toggleTheme()">🌓 Theme</button>
  </div>
</nav>

<!-- The rest of your HTML content -->
<script src="app.js"></script>
</body>
</html>
